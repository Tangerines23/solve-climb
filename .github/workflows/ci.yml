name: CI
run-name: CI - ${{ github.event.head_commit.message || 'Workflow manual run' }} by @${{ github.actor }}

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # auth/DB E2E: 하루 1회 (UTC 02:00) — 429 rate limit 절감
    - cron: '0 2 * * *'

jobs:
  # 1. 의존성 설치 및 캐싱 (다른 모든 작업의 기반)
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

  # 2. 코드 품질 및 타입 체크 (AI 최적화: 개별 단계 분리)
  validate:
    needs: setup
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: 🛡️ Security Shield (Secrets)
        run: npm run check:secrets

      - name: ⭕ Circular Dependency Check
        run: npm run check:circular

      - name: 🧹 Code Integrity (Spell & Magic & CSS)
        run: npm run check:integrity

      - name: ⚡ Logic Leash (Performance)
        run: npm run check:logic

      - name: 📊 Benchmark Tests
        run: npm run test:bench

  # 3. 비즈니스 로직 및 컴포넌트 단위 테스트
  unit-test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Run Unit Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run test:all -- --reporter=default --reporter=github-actions --reporter=junit --outputFile=reports/test-results.xml

      - name: 📦 Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: reports/
          retention-days: 7

  # 4. 데이터베이스 및 보안 검증
  security-db:
    needs: setup
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      IS_DOCKER: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Security audit
        run: npm run check:security

      # 디버그: CI에서 어떤 시크릿이 보이는지만 출력 (값은 절대 노출 안 함)
      - name: 🔍 Secrets availability (SET/NOT SET only)
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "SUPABASE_DB_PASSWORD:    $([ -n \"$SUPABASE_DB_PASSWORD\" ] && echo SET || echo NOT SET)"
          echo "SUPABASE_ACCESS_TOKEN:   $([ -n \"$SUPABASE_ACCESS_TOKEN\" ] && echo SET || echo NOT SET)"
          echo "VITE_SUPABASE_URL:       $([ -n \"$VITE_SUPABASE_URL\" ] && echo SET || echo NOT SET)"
          echo "VITE_SUPABASE_ANON_KEY:  $([ -n \"$VITE_SUPABASE_ANON_KEY\" ] && echo SET || echo NOT SET)"

      # Secrets 미설정 시 supabase link 전에 바로 실패 → 오류 원인 명확화
      - name: 🔐 Validate required secrets
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          MISSING=""
          [ -z "$SUPABASE_DB_PASSWORD" ] && MISSING="$MISSING SUPABASE_DB_PASSWORD"
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING="$MISSING SUPABASE_ACCESS_TOKEN"
          [ -z "$VITE_SUPABASE_URL" ] && MISSING="$MISSING VITE_SUPABASE_URL"
          if [ -z "$MISSING" ]; then
            echo "✅ All required secrets are configured"
          else
            echo "::warning::Required secrets are missing:$MISSING"
            echo "If this run is from a Pull Request from a FORK: GitHub does not pass repository secrets to fork PRs."
            echo "CI will proceed with mocks/limited validation where possible."
          fi

      - name: 🐘 DB Lint Check & Validation (Local-First)
        run: |
          # Start minimal Supabase services for linting (requires Docker)
          # We include edge-functions if needed, but keeping it minimal for speed
          npx supabase@v2.90.0 start -x realtime,storage,inbucket,studio --debug
          
          # Wait for services to be ready
          node scripts/check-services-health.js
          
          # Apply current PR migrations to the local instance
          npx supabase db reset
          
          # Run lint against the newly reset local database
          npm run check:db:lint
          
          # Extract local keys for validation script
          LOCAL_JSON=$(npx supabase status -o json)
          VITE_SUPABASE_URL=$(echo $LOCAL_JSON | jq -r '.API_URL' | sed 's/localhost/127.0.0.1/')
          # Using Service Role Key for validation to bypass RLS on test functions
          VITE_SUPABASE_ANON_KEY=$(echo $LOCAL_JSON | jq -r '.SERVICE_ROLE_KEY')
          
          export VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          export VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY
          npm run check:db:validation

      # 가동 실패 시 원인 파악을 위한 데이터 덤프
      - name: 📋 Post-failure Diagnostics
        if: failure()
        run: |
          echo "==== Docker Container Status ===="
          docker ps -a
          echo -e "\n==== Supabase Status ===="
          npx supabase status
          echo -e "\n==== Recent Container Logs (Kong/PostgREST) ===="
          docker logs supabase_kong_solve-climb --tail 100 || true
          docker logs supabase_rest_solve-climb --tail 100 || true

  # 5. 빌드 가능성 확인
  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Build project
        env:
          VITE_CI: true
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist
          retention-days: 1

  # 6. E2E 안정성 및 가혹 테스트 (Stability)
  e2e-stability-test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # 캐시된 브라우저가 있을 경우 시스템 의존성(OS 라이브러리)만 추가 설치
      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: 🐒 Run Chaos & Network Stress Tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CI: true
        run: |
          npm run test:chaos
          npm run test:stress:deep

  # 7a. E2E 핵심 경로 (스모크·인증·비즈니스·검증) — 빠른 피드백
  e2e-critical:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # 캐시된 브라우저가 있을 경우 시스템 의존성(OS 라이브러리)만 추가 설치
      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E Critical (smoke, core, verify, diagnostic — auth/DB 제외)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CI: true
        run: npm run test:e2e:critical

      - name: 📦 Upload Playwright Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-critical
          path: playwright-report/
          retention-days: 7

  # 7a-2. auth/DB E2E (스케줄: 하루 1회) — 429 rate limit 절감
  e2e-auth-db:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # push/PR 시에는 건너뛰고, schedule 시에만 실행
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      # SUPABASE_ACCESS_TOKEN 미설정 시: Supabase 대시보드 → Account → Access Tokens에서 토큰 생성 후,
      # GitHub 저장소 Settings → Secrets and variables → Actions에 SUPABASE_ACCESS_TOKEN으로 추가
      - name: Apply DB migrations (game_activity 등 db-status-check 필요 테이블)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::warning::SUPABASE_DB_PASSWORD or VITE_SUPABASE_URL not set — skipping db push"
            exit 0
          fi
          export PROJECT_REF=$(echo "$VITE_SUPABASE_URL" | sed -E 's|https://([^.]+)\.supabase\.co.*|\1|')
          npx supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          
          OUTPUT=$(npx supabase db push --include-all --yes 2>&1) || EXIT_CODE=$?
          if [ -n "$OUTPUT" ]; then
            echo "$OUTPUT"
          fi
          if [ -n "$EXIT_CODE" ] && [ "$EXIT_CODE" -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "Remote migration versions not found"; then
              echo "::warning::Remote database has migrations not present locally. Proceeding without failing."
            else
              exit "$EXIT_CODE"
            fi
          fi

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # 캐시된 브라우저가 있을 경우 시스템 의존성(OS 라이브러리)만 추가 설치
      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E auth/DB (auth-test, db-status-check)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CI: true
        run: npm run test:e2e:auth-db

  # 7b. 시각적 회귀·a11y·레이아웃 정밀 감사 (Visual & Layout)
  # Linux VRT 스냅샷 없음/미달 시 실패 → continue-on-error로 워크플로는 통과, 나중에 Update VRT 워크플로로 스냅샷 보강
  e2e-visual-layout:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      # SUPABASE_ACCESS_TOKEN 미설정 시: Supabase 대시보드 → Account → Access Tokens에서 토큰 생성 후,
      # GitHub 저장소 Settings → Secrets and variables → Actions에 SUPABASE_ACCESS_TOKEN으로 추가
      - name: Apply DB migrations (game_activity 등 E2E 필요 테이블)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::warning::SUPABASE_DB_PASSWORD or VITE_SUPABASE_URL not set — skipping db push (E2E may fail if game_activity missing)"
            exit 0
          fi
          export PROJECT_REF=$(echo "$VITE_SUPABASE_URL" | sed -E 's|https://([^.]+)\.supabase\.co.*|\1|')
          npx supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          
          OUTPUT=$(npx supabase db push --include-all --yes 2>&1) || EXIT_CODE=$?
          if [ -n "$OUTPUT" ]; then
            echo "$OUTPUT"
          fi
          if [ -n "$EXIT_CODE" ] && [ "$EXIT_CODE" -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "Remote migration versions not found"; then
              echo "::warning::Remote database has migrations not present locally. Proceeding without failing."
            else
              exit "$EXIT_CODE"
            fi
          fi

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # 캐시된 브라우저가 있을 경우 시스템 의존성(OS 라이브러리)만 추가 설치
      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E Visual & A11y
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CI: true
        run: |
          npm run test:e2e:visual
          npm run test:a11y

      - name: 📐 Layout Precision Audit (Deep Scan)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CI: true
        run: npm run check:layout:deep:with-server

      - name: 📦 Upload Playwright Reports & Snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # 8. 성능 및 웹 표준 감사 (Lighthouse 미달 시에도 워크플로 통과, 나중에 성능 개선 후 제거)
  performance-audit:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist

      - name: 📦 Check Bundle Size
        run: npm run check:size

      - name: ⚡ Lighthouse Score Audit
        run: npm run check:score
