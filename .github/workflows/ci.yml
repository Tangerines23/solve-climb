name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 워크플로우 레벨 권한 설정
permissions:
  contents: read
  pull-requests: write

jobs:
  # Phase 1: 핵심 검증 (타입 체크, 린트, 포맷, 빌드)
  validate:
    name: Code Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          # 캐시 강제 무효화를 위한 접두사 추가 가능

      - name: Install dependencies
        run: npm ci --verbose

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Check for CSS file changes
        id: css-check
        run: |
          # PR 이벤트인 경우 변경된 파일 목록 가져오기
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }} || true
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.ref }}...HEAD | grep '\.css$' || true)
          else
            # Push 이벤트인 경우 마지막 커밋의 변경 파일 확인
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '\.css$' || true)
          fi
          
          if [ -n "$CHANGED_FILES" ]; then
            echo "has_css_changes=true" >> $GITHUB_OUTPUT
            echo "Changed CSS files:"
            echo "$CHANGED_FILES"
          else
            echo "has_css_changes=false" >> $GITHUB_OUTPUT
            echo "No CSS file changes detected"
          fi

      - name: CSS validation
        if: steps.css-check.outputs.has_css_changes == 'true'
        run: npm run check:css

      - name: Production build
        run: npm run build

      - name: Bundle size audit
        run: npm run check:size

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

  # Phase 2: 테스트 및 커버리지
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          # 캐시 강제 무효화를 위한 접두사 추가 가능

      - name: Install dependencies
        run: npm ci --verbose

      - name: Run tests
        run: npm run test -- --run

      - name: Generate coverage with thresholds
        run: npm run test:coverage

      - name: Check coverage thresholds
        run: |
          echo "📊 커버리지 임계값 확인:" >> $GITHUB_STEP_SUMMARY
          echo "  - Lines: 80%" >> $GITHUB_STEP_SUMMARY
          echo "  - Functions: 80%" >> $GITHUB_STEP_SUMMARY
          echo "  - Branches: 75%" >> $GITHUB_STEP_SUMMARY
          echo "  - Statements: 80%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 커버리지 임계값 확인:"
          echo "  - Lines: 80%"
          echo "  - Functions: 80%"
          echo "  - Branches: 75%"
          echo "  - Statements: 80%"
          echo ""
          echo "⚠️ 현재 커버리지가 임계값보다 낮을 수 있습니다. 테스트를 추가하여 커버리지를 향상시켜주세요."

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 7
        continue-on-error: true

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            try {
              const coveragePath = path.join(process.cwd(), 'coverage', 'coverage-summary.json');
              if (fs.existsSync(coveragePath)) {
                const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
                const total = coverage.total;
                
                const lines = (total.lines.pct || 0).toFixed(2);
                const functions = (total.functions.pct || 0).toFixed(2);
                const branches = (total.branches.pct || 0).toFixed(2);
                const statements = (total.statements.pct || 0).toFixed(2);
                
                const comment = `## 📊 테스트 커버리지 리포트
                
                | 항목 | 커버리지 | 임계값 | 상태 |
                |------|----------|--------|------|
                | Lines | ${lines}% | 80% | ${lines >= 80 ? '✅' : '⚠️'} |
                | Functions | ${functions}% | 80% | ${functions >= 80 ? '✅' : '⚠️'} |
                | Branches | ${branches}% | 75% | ${branches >= 75 ? '✅' : '⚠️'} |
                | Statements | ${statements}% | 80% | ${statements >= 80 ? '✅' : '⚠️'} |
                
                ${lines >= 80 && functions >= 80 && branches >= 75 && statements >= 80 
                  ? '✅ 모든 커버리지 임계값을 충족했습니다!' 
                  : '⚠️ 일부 커버리지 임계값을 충족하지 못했습니다. 테스트를 추가해주세요.'}
                `;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('커버리지 리포트 생성 실패:', error.message);
            }
        continue-on-error: true

  # Phase 4: 보안 검사 (병렬 실행) - 필수
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          # 캐시 강제 무효화를 위한 접두사 추가 가능

      - name: Install dependencies
        run: npm ci --verbose

      - name: Security audit
        run: npm run check:security

      - name: Upload security report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            package-lock.json
          retention-days: 7
        continue-on-error: true

  # Phase 5: DB 검증 (조건부 실행)
  db-validation:
    name: Database Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          # 캐시 강제 무효화를 위한 접두사 추가 가능

      - name: Install dependencies
        run: npm ci --verbose

      - name: Check for DB file changes
        id: db-check
        run: |
          # PR 이벤트인 경우 변경된 파일 목록 가져오기
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }} || true
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.ref }}...HEAD | grep -E 'supabase/(migrations/.*\.sql|.*\.sql)$' || true)
          else
            # Push 이벤트인 경우 마지막 커밋의 변경 파일 확인
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E 'supabase/(migrations/.*\.sql|.*\.sql)$' || true)
          fi
          
          if [ -n "$CHANGED_FILES" ]; then
            echo "has_db_changes=true" >> $GITHUB_OUTPUT
            echo "Changed DB files:"
            echo "$CHANGED_FILES"
          else
            echo "has_db_changes=false" >> $GITHUB_OUTPUT
            echo "No DB file changes detected"
          fi

      - name: DB validation
        if: steps.db-check.outputs.has_db_changes == 'true'
        run: npm run check:db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

  # Phase 6: E2E 및 시각적 회귀 테스트 (Playwright)
  e2e:
    name: E2E & Visual Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --verbose

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # 최종 상태 확인 (모든 Job 완료 후)
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [validate, test, security, e2e]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "❌ CI failed"
            echo ""
            echo "Failed jobs:"
            [ "${{ needs.validate.result }}" != "success" ] && echo "  - Code Validation" || true
            [ "${{ needs.test.result }}" != "success" ] && echo "  - Tests & Coverage" || true
            [ "${{ needs.security.result }}" != "success" ] && echo "  - Security Audit (보안 취약점 발견)" || true
            [ "${{ needs.e2e.result }}" != "success" ] && echo "  - E2E & Visual Tests" || true
            exit 1
          else
            echo "✅ CI passed"
          fi

