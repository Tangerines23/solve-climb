name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 워크플로우 레벨 권한 설정
permissions:
  contents: read
  pull-requests: write

jobs:
  # Phase 1: 핵심 검증 (타입 체크, 린트, 포맷, 빌드)
  validate:
    name: Code Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Check for CSS file changes
        id: css-check
        run: |
          # PR 이벤트인 경우 변경된 파일 목록 가져오기
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }} || true
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.ref }}...HEAD | grep '\.css$' || true)
          else
            # Push 이벤트인 경우 마지막 커밋의 변경 파일 확인
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '\.css$' || true)
          fi
          
          if [ -n "$CHANGED_FILES" ]; then
            echo "has_css_changes=true" >> $GITHUB_OUTPUT
            echo "Changed CSS files:"
            echo "$CHANGED_FILES"
          else
            echo "has_css_changes=false" >> $GITHUB_OUTPUT
            echo "No CSS file changes detected"
          fi

      - name: CSS validation
        if: steps.css-check.outputs.has_css_changes == 'true'
        run: npm run check:css

      - name: Production build
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

  # Phase 2: 테스트 및 커버리지
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Generate coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 7
        continue-on-error: true

  # Phase 4: 보안 검사 (병렬 실행)
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm run check:security
        continue-on-error: true

  # Phase 5: DB 검증 (조건부 실행)
  db-validation:
    name: Database Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for DB file changes
        id: db-check
        run: |
          # PR 이벤트인 경우 변경된 파일 목록 가져오기
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }} || true
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.ref }}...HEAD | grep -E 'supabase/(migrations/.*\.sql|.*\.sql)$' || true)
          else
            # Push 이벤트인 경우 마지막 커밋의 변경 파일 확인
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E 'supabase/(migrations/.*\.sql|.*\.sql)$' || true)
          fi
          
          if [ -n "$CHANGED_FILES" ]; then
            echo "has_db_changes=true" >> $GITHUB_OUTPUT
            echo "Changed DB files:"
            echo "$CHANGED_FILES"
          else
            echo "has_db_changes=false" >> $GITHUB_OUTPUT
            echo "No DB file changes detected"
          fi

      - name: DB validation
        if: steps.db-check.outputs.has_db_changes == 'true'
        run: npm run check:db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

  # 최종 상태 확인 (모든 Job 완료 후)
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [validate, test, security]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ CI passed"
          fi

