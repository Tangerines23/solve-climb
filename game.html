<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 - 문제 풀이</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #121212;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .game-container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .back-button {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }

    .back-button:hover {
      opacity: 0.7;
    }

    .game-info {
      text-align: center;
      flex: 1;
    }

    .category-label {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 4px;
    }

    .level-label {
      font-size: 12px;
      color: #666;
    }

    .question-card {
      background-color: #1e1e1e;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 30px;
      border: 1px solid #2c2c2c;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      text-align: center;
    }

    .question-display {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 24px;
      word-break: break-word;
    }

    .answer-display {
      font-size: 24px;
      color: #3182f6;
      min-height: 40px;
      text-align: center;
      margin-bottom: 20px;
    }

    /* 키패드 UI (type === 'keypad') */
    .keypad-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 300px;
      margin: 0 auto;
    }

    .keypad-button {
      background-color: #2c2c2c;
      border: 1px solid #3c3c3c;
      color: #ffffff;
      font-size: 24px;
      font-weight: bold;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .keypad-button:hover:not(:disabled) {
      background-color: #3c3c3c;
      transform: scale(1.05);
    }

    .keypad-button:active:not(:disabled) {
      transform: scale(0.95);
    }

    .keypad-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .keypad-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .action-button {
      flex: 1;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-button {
      background-color: #6b7280;
      color: #ffffff;
    }

    .clear-button:hover:not(:disabled) {
      background-color: #4b5563;
    }

    .backspace-button {
      background-color: #ef4444;
      color: #ffffff;
    }

    .backspace-button:hover:not(:disabled) {
      background-color: #dc2626;
    }

    .submit-button {
      background-color: #3182f6;
      color: #ffffff;
      width: 100%;
      max-width: 300px;
      margin: 20px auto 0;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: block;
    }

    .submit-button:hover:not(:disabled) {
      background-color: #2563eb;
    }

    .submit-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* O/X UI (type === 'ox') */
    .ox-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }

    .ox-button {
      flex: 1;
      max-width: 150px;
      padding: 24px;
      font-size: 32px;
      font-weight: bold;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ox-button-o {
      background-color: #10b981;
      color: #ffffff;
    }

    .ox-button-o:hover:not(:disabled) {
      background-color: #059669;
      transform: scale(1.05);
    }

    .ox-button-x {
      background-color: #ef4444;
      color: #ffffff;
    }

    .ox-button-x:hover:not(:disabled) {
      background-color: #dc2626;
      transform: scale(1.05);
    }

    .ox-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 4지 선다 UI (type === 'choice') */
    .choice-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .choice-button {
      padding: 20px;
      font-size: 18px;
      font-weight: bold;
      border: 2px solid #3c3c3c;
      border-radius: 12px;
      background-color: #2c2c2c;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .choice-button:hover:not(:disabled) {
      background-color: #3c3c3c;
      border-color: #3182f6;
      transform: scale(1.02);
    }

    .choice-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #aaa;
    }

    .error {
      text-align: center;
      padding: 40px;
      color: #ef4444;
    }

    .correct-feedback {
      color: #10b981;
      font-size: 18px;
      margin-top: 16px;
      text-align: center;
    }

    .wrong-feedback {
      color: #ef4444;
      font-size: 18px;
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <button class="back-button" onclick="goBack()">←</button>
      <div class="game-info">
        <div class="category-label" id="categoryLabel">-</div>
        <div class="level-label" id="levelLabel">레벨 -</div>
      </div>
      <div style="width: 40px;"></div> <!-- 스페이서 -->
    </div>

    <div class="question-card">
      <div class="hint" id="hint">-</div>
      <div class="question-display" id="questionDisplay">문제를 불러오는 중...</div>
      <div class="answer-display" id="answerDisplay"></div>

      <!-- 키패드 UI (type === 'keypad') -->
      <div id="keypadUI" style="display: none;">
        <div class="keypad-container">
          <button class="keypad-button" onclick="handleKeypadNumber('1')">1</button>
          <button class="keypad-button" onclick="handleKeypadNumber('2')">2</button>
          <button class="keypad-button" onclick="handleKeypadNumber('3')">3</button>
          <button class="keypad-button" onclick="handleKeypadNumber('4')">4</button>
          <button class="keypad-button" onclick="handleKeypadNumber('5')">5</button>
          <button class="keypad-button" onclick="handleKeypadNumber('6')">6</button>
          <button class="keypad-button" onclick="handleKeypadNumber('7')">7</button>
          <button class="keypad-button" onclick="handleKeypadNumber('8')">8</button>
          <button class="keypad-button" onclick="handleKeypadNumber('9')">9</button>
        </div>
        <div class="keypad-actions">
          <button class="action-button clear-button" onclick="handleClear()">지우기</button>
          <button class="action-button backspace-button" onclick="handleBackspace()">←</button>
        </div>
        <button class="keypad-button" onclick="handleKeypadNumber('0')" style="max-width: 300px; margin: 12px auto 0; display: block;">0</button>
        <button class="submit-button" onclick="handleSubmit()" id="submitButton">제출</button>
      </div>

      <!-- O/X UI (type === 'ox') -->
      <div id="oxUI" style="display: none;">
        <div class="ox-container">
          <button class="ox-button ox-button-o" onclick="handleOX('O')">O</button>
          <button class="ox-button ox-button-x" onclick="handleOX('X')">X</button>
        </div>
      </div>

      <!-- 4지 선다 UI (type === 'choice') -->
      <div id="choiceUI" style="display: none;">
        <div class="choice-container" id="choiceContainer">
          <!-- 동적으로 생성됨 -->
        </div>
      </div>

      <!-- 피드백 메시지 -->
      <div id="feedback" style="display: none;"></div>
    </div>
  </div>

  <!-- 게임 엔진 스크립트 -->
  <script src="assets/js/game_engine.js"></script>

  <script>
    // URL 파라미터에서 게임 설정 읽기
    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('category') || 'math';
    const sub = urlParams.get('sub') || 'arithmetic';
    const level = parseInt(urlParams.get('level') || '1', 10);

    // 현재 문제 상태
    let currentProblem = null;
    let currentAnswer = '';
    let isSubmitting = false;

    // UI 요소 참조
    const categoryLabel = document.getElementById('categoryLabel');
    const levelLabel = document.getElementById('levelLabel');
    const hintElement = document.getElementById('hint');
    const questionDisplay = document.getElementById('questionDisplay');
    const answerDisplay = document.getElementById('answerDisplay');
    const keypadUI = document.getElementById('keypadUI');
    const oxUI = document.getElementById('oxUI');
    const choiceUI = document.getElementById('choiceUI');
    const choiceContainer = document.getElementById('choiceContainer');
    const feedback = document.getElementById('feedback');

    // 카테고리 이름 매핑
    const categoryNames = {
      'math': '수학',
      'language': '언어',
      'general': '상식',
      'logic': '논리',
    };

    // 초기화
    function init() {
      // UI 업데이트
      categoryLabel.textContent = categoryNames[category] || category;
      levelLabel.textContent = `레벨 ${level}`;

      // 문제 생성
      generateNewProblem();
    }

    // 새 문제 생성
    function generateNewProblem() {
      try {
        // 엔진에서 문제 생성
        currentProblem = GameEngine.generateProblem(category, sub, level);
        
        if (!currentProblem) {
          showError('문제를 생성할 수 없습니다.');
          return;
        }

        // UI 업데이트
        hintElement.textContent = currentProblem.hint || '-';
        questionDisplay.textContent = currentProblem.questionDisplay || '문제 없음';
        answerDisplay.textContent = '';
        currentAnswer = '';
        isSubmitting = false;
        feedback.style.display = 'none';

        // type에 따라 UI 전환
        switch (currentProblem.type) {
          case 'keypad':
            showKeypadUI();
            break;
          case 'ox':
            showOXUI();
            break;
          case 'choice':
            showChoiceUI();
            break;
          default:
            console.warn('알 수 없는 문제 타입:', currentProblem.type);
            showKeypadUI(); // 기본값
        }
      } catch (error) {
        console.error('문제 생성 오류:', error);
        showError('문제를 생성하는 중 오류가 발생했습니다.');
      }
    }

    // 키패드 UI 표시
    function showKeypadUI() {
      keypadUI.style.display = 'block';
      oxUI.style.display = 'none';
      choiceUI.style.display = 'none';
    }

    // O/X UI 표시
    function showOXUI() {
      keypadUI.style.display = 'none';
      oxUI.style.display = 'block';
      choiceUI.style.display = 'none';
    }

    // 4지 선다 UI 표시
    function showChoiceUI() {
      keypadUI.style.display = 'none';
      oxUI.style.display = 'none';
      choiceUI.style.display = 'block';

      // 선택지 버튼 생성
      choiceContainer.innerHTML = '';
      
      if (currentProblem.options && currentProblem.options.length > 0) {
        currentProblem.options.forEach((option, index) => {
          const button = document.createElement('button');
          button.className = 'choice-button';
          button.textContent = option;
          button.onclick = () => handleChoice(String(option));
          choiceContainer.appendChild(button);
        });
      } else {
        // 옵션이 없으면 임시로 콘솔 로그
        console.warn('4지 선다 문제에 옵션이 없습니다.');
        choiceContainer.innerHTML = '<p style="color: #aaa; text-align: center;">선택지가 준비되지 않았습니다.</p>';
      }
    }

    // 키패드 숫자 입력
    function handleKeypadNumber(num) {
      if (isSubmitting) return;
      if (currentAnswer.length >= 10) return; // 최대 10자리
      currentAnswer += num;
      answerDisplay.textContent = currentAnswer;
    }

    // 지우기
    function handleClear() {
      if (isSubmitting) return;
      currentAnswer = '';
      answerDisplay.textContent = '';
    }

    // 백스페이스
    function handleBackspace() {
      if (isSubmitting) return;
      currentAnswer = currentAnswer.slice(0, -1);
      answerDisplay.textContent = currentAnswer;
    }

    // O/X 선택
    function handleOX(answer) {
      if (isSubmitting) return;
      currentAnswer = answer;
      answerDisplay.textContent = answer;
      // O/X는 자동 제출
      setTimeout(() => handleSubmit(), 300);
    }

    // 4지 선다 선택
    function handleChoice(answer) {
      if (isSubmitting) return;
      currentAnswer = answer;
      answerDisplay.textContent = answer;
      // 선택지도 자동 제출
      setTimeout(() => handleSubmit(), 300);
    }

    // 제출
    function handleSubmit() {
      if (isSubmitting || !currentProblem) return;
      if (!currentAnswer || currentAnswer.trim() === '') return;

      isSubmitting = true;

      // 정답 확인
      const isCorrect = currentAnswer.trim() === String(currentProblem.answer).trim();

      // 피드백 표시
      feedback.style.display = 'block';
      if (isCorrect) {
        feedback.className = 'correct-feedback';
        feedback.textContent = '정답입니다! ✓';
      } else {
        feedback.className = 'wrong-feedback';
        feedback.textContent = `오답입니다. 정답: ${currentProblem.answer}`;
      }

      // 다음 문제로 이동 (정답이면 1초 후, 오답이면 2초 후)
      setTimeout(() => {
        generateNewProblem();
      }, isCorrect ? 1000 : 2000);
    }

    // 에러 표시
    function showError(message) {
      questionDisplay.textContent = message;
      questionDisplay.style.color = '#ef4444';
      keypadUI.style.display = 'none';
      oxUI.style.display = 'none';
      choiceUI.style.display = 'none';
    }

    // 뒤로 가기
    function goBack() {
      if (confirm('게임을 중단하시겠습니까?')) {
        window.history.back();
      }
    }

    // 페이지 로드 시 초기화
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
