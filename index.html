<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/SolveClimb.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@400;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00BFA5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Solve Climb" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' blob:; worker-src * blob:; style-src * 'unsafe-inline'; img-src * data: https:; font-src * data:; connect-src *;"
    />
    <meta
      name="description"
      content="Solve Climb - Challenge algorithm problems, build your roadmap, and climb the ranks!"
    />
    <link rel="apple-touch-icon" href="/SolveClimb.webp" />
    <title>Solve Climb</title>
    <style>
      body {
        background-color: #121212;
        color: #ffffff;
        margin: 0;
        font-family: 'Pretendard Variable', sans-serif;
      }
      #loading-check {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #121212;
        z-index: 1000;
        transition: opacity 0.3s ease-out;
      }
      .loader-title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 12px;
        color: #00e5c1;
      }
    </style>
  </head>
  <body>
    <div id="loading-check">
      <img
        src="/SolveClimb.webp"
        width="120"
        height="120"
        alt="Logo"
        style="margin-bottom: 20px"
        fetchpriority="high"
      />
      <div class="loader-title">Solve Climb</div>
      <div id="js-status" style="font-size: 14px; opacity: 0.8">Initializing...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
