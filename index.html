<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/webp" href="/SolveClimb.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#00BFA5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Solve Climb" />
  <!-- Content Security Policy -->
  <!-- 개발 환경에서는 unsafe-inline/unsafe-eval 필요, 프로덕션에서는 Vite가 최적화 -->
  <!-- 디버깅 URL은 환경 변수로 관리되므로 CSP에서 제거 -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' blob:; worker-src * blob:; style-src * 'unsafe-inline'; img-src * data: https:; font-src * data:; connect-src *;">
  <title>Solve Climb</title>
  <script>
    function copyErrorLog() {
      const content = document.getElementById('debug-content').innerText;
      const el = document.createElement('textarea');
      el.value = content;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      // alert 제거: 사용자 요청에 따라 팝업 없이 처리
      console.log('Error log copied to clipboard');
    }
  </script>

  <!-- [DIAGNOSIS] 즉시 실행되는 진단 스크립트 - 하단 이동 및 논블로킹화 -->
  <script defer>
    (function () {
      window.diagnosis = function (msg, color) {
        const statusEl = document.getElementById('js-status');
        if (statusEl) {
          statusEl.innerText = msg;
          if (color) statusEl.style.color = color;
        }
        console.log('[Diagnosis] ' + msg);
      };

      window.onerror = function (message, source, lineno, colno, error) {
        const overlay = document.getElementById('debug-overlay');
        const content = document.getElementById('debug-content');
        if (overlay && content) {
          overlay.style.display = 'block';
          content.innerHTML += '<div style="margin-bottom:10px; border-bottom:1px solid #444; padding-bottom:5px;">' +
            '<div style="font-weight:bold; color:#ff6666;">[Inline Error] ' + message + '</div>' +
            '<div style="color:#aaa;">' + source + ':' + lineno + '</div>' +
            (error && error.stack ? '<pre style="font-size:10px; color:#888; white-space:pre-wrap; background:#111; padding:5px;">' + error.stack + '</pre>' : '') +
            '</div>';
        }
        diagnosis('Runtime Error', '#ff6666');
        return false;
      };

      window.addEventListener('error', function (e) {
        if (e.target.tagName === 'SCRIPT') {
          const src = e.target.src || 'inline';
          diagnosis('Script Load Failed: ' + src.split('/').pop(), '#ff4444');
          console.error('Script Error:', e);
        }
      }, true);

      window.addEventListener('DOMContentLoaded', () => {
        diagnosis('HTML Ready. Loading JS...', '#ffffff');
      });
    })();
  </script>

  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      margin: 0;
    }

    /* Critical UI Styles - Moved from inline to reduce parsing overhead */
    #debug-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.95);
      color: #ff4444;
      z-index: 9999;
      padding: 20px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      pointer-events: auto;
    }

    #loading-check {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #121212;
      color: white;
      font-family: sans-serif;
      text-align: center;
      z-index: 1000;
      transition: opacity 0.3s ease-out;
    }

    .loader-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
      /* Accessibility: Contrast 4.5:1+ for #121212 background */
      color: #00e5c1;
    }

    .loader-status {
      color: #ffffff;
      font-size: 16px;
    }

    .loader-version {
      margin-top: 20px;
      font-size: 10px;
      /* Accessibility: Raised from #aaa to #ffffff for contrast */
      color: #ffffff;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div id="debug-overlay" data-vg-ignore="true">
    <h3 style="color:white; margin-top:0;">⚠️ Runtime Error Detected</h3>
    <div id="debug-content" style="margin-bottom: 20px;"></div>
    <div style="display: flex; gap: 10px;">
      <button onclick="window.location.reload()"
        style="padding:10px 15px; background:#444; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Restart
        App</button>
      <button onclick="copyErrorLog()"
        style="padding:10px 15px; background:#00BFA5; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Copy
        Error Log</button>
    </div>
  </div>

  <!-- JS 로드 확인용 가시적 태그 -->
  <div id="loading-check">
    <img src="/SolveClimb.webp" width="120" height="120" alt="Logo" style="margin-bottom: 20px; fetchpriority: high;" />
    <div class="loader-title">Solve Climb</div>
    <div id="js-status" class="loader-status">AppContainer Initializing...</div>
    <div class="loader-version">v1.2.0</div>
  </div>

  <div id="root"></div>
  <!-- LCP optimization: Logo and critical scripts -->
  <link rel="preload" href="/SolveClimb.webp" as="image" fetchpriority="high">
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
